# ==================================================
#                  mLevels - config.yml
# ==================================================

general:
  broadcast-level-up: true

# ==================================================
#   Death Penalty - how many LEVELS a player loses on death, based on how
#   far their progression (peak level) has gone. Fully editable: add,
#   remove, or change tiers freely. "up-to-level" means "applies while the
#   player's peak level is less than or equal to this number".
#
#   Default rules:
#     Tier 1: level 1  -> before first Diamond item (level 45)   = lose 2
#     Tier 2: level 45 -> before Diamond Protection III (level 83) = lose 3
#     Tier 3: level 83 and beyond                                  = lose 4
#
#   NOTE: losing levels only reduces the visible level counter and affects
#   the NEXT death-penalty tier lookup. It never strips away gear the player
#   has already earned (their sword/armor/axe/bow stay exactly as they are).
# ==================================================
death-penalty:
  default-loss: 2
  tiers:
    tier1:
      up-to-level: 44
      levels-lost: 2
    tier2:
      up-to-level: 82
      levels-lost: 3
    tier3:
      up-to-level: 999999
      levels-lost: 4

rank-kits:
  enabled: true
  command: "playerkits2 claim {kit}"
  ranks:
    custom:
      permission: "group.custom"
      kit: "custom"
    revon:
      permission: "group.revon"
      kit: "revon"
    turbo:
      permission: "group.turbo"
      kit: "turbo"
    elite:
      permission: "group.elite"
      kit: "elite"
    vip:
      permission: "group.vip"
      kit: "vip"

messages:
  prefix: "&8[&6mLevels&8] &r"
  level-up: "&aYou reached level &e{level} &7(&e{stage}&7) &8- &7{max_level} max"
  level-up-broadcast: "&e{player} &7reached level &6{level} &7(&6{stage}&7)"
  level-restored: "&7Level restored: &e{level}&7/{max_level}"
  death-penalty: "&cYou lost &e{amount} &clevels from dying! Current level: &e{level}"
  no-permission: "&cYou don't have permission to do that"
  reloaded: "&aConfig reloaded successfully"
  level-set: "&aSet {player}'s level to {level}"
  level-added: "&aAdded {amount} levels to {player} (now {level})"
  level-removed: "&aRemoved {amount} levels from {player} (now {level})"
  level-check: "&7{player} is level &e{level}&7/{max_level} &8(peak: &e{peak}&8)"
  level-reset: "&aReset {player}'s level and progress"
