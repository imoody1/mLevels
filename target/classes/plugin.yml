name: mLevels
version: '1.0.0'
main: com.skypvp.mlevels.Main
author: SkyPvP
description: "Gear leveling system (Iron -> Diamond -> Thorns) that upgrades on every kill, for SkyPvP servers"
softdepend: [PlaceholderAPI, PlayerKits2]

commands:
  mlevels:
    description: "mLevels admin commands"
    usage: /mlevels <reload|set|add|remove|check|reset>
    aliases: [mlvl, levelup]
  level:
    description: "Shows your current level"
    usage: /level [player]

permissions:
  mlevels.admin:
    description: "Permission to manage the plugin (reload/set/add/remove/reset)"
    default: op
